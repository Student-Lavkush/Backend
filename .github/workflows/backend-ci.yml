name: Instantfoodie Backend CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # Matches your Node v22 environment

    - name: Install server dependencies
      working-directory: ./server
      run: npm ci

    - name: Verify build runs without syntax errors
      working-directory: ./server
      env:
        # Provide dummy values so the app initializes without crashing on missing env variables
        JWT_SECRET: ci_test_secret_key_12345
        NODE_ENV: test
      run: |
        # This checks the entry files for compile errors without spinning up the live listening server permanently
        node --check src/app.js
        node --check index.js